<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CYBERPUNK // ESP FLASHER CORES</title>
    <!-- Подключение официального скрипта ESP Web Tools -->
    <script type="module" src="https://unpkg.com"></script>
    <style>
        :root {
            --bg-cyber: #05050d;
            --neon-blue: #00f0ff;
            --neon-purple: #9d4edd;
            --neon-red: #ff0055;
            --panel-bg: rgba(13, 11, 26, 0.75);
            --panel-border: #241942;
            --text-cyber: #e2e8f0;
            --font-mono: 'Courier New', Courier, monospace;
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-cyber);
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(0, 240, 255, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(255, 0, 85, 0.05) 0%, transparent 40%);
            color: var(--text-cyber);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
            overflow-x: hidden;
        }

        .cyber-panel {
            background: var(--panel-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 2px solid var(--panel-border);
            border-radius: 4px;
            padding: 40px;
            width: 100%;
            max-width: 460px;
            position: relative;
            box-shadow: 
                0 0 30px rgba(157, 78, 221, 0.15),
                inset 0 0 15px rgba(0, 240, 255, 0.05);
            clip-path: polygon(0 0, 93% 0, 100% 7%, 100% 100%, 7% 100%, 0 93%);
        }

        /* Декоративные углы в стиле интерфейсов */
        .cyber-panel::before {
            content: 'SYS.LOC // 0x7F';
            position: absolute;
            top: 8px;
            right: 40px;
            font-family: var(--font-mono);
            font-size: 9px;
            color: var(--neon-purple);
            letter-spacing: 2px;
        }

        h1 {
            font-family: var(--font-mono);
            font-size: 24px;
            font-weight: 900;
            margin: 0 0 6px 0;
            text-align: left;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #fff;
            text-shadow: 
                0 0 10px var(--neon-blue),
                0 0 20px rgba(0, 240, 255, 0.5);
        }

        .status-grid {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-family: var(--font-mono);
            font-size: 11px;
            color: var(--neon-blue);
            margin-bottom: 30px;
            border-bottom: 1px solid var(--panel-border);
            padding-bottom: 12px;
        }

        .status-dot {
            width: 6px;
            height: 6px;
            background-color: var(--neon-red);
            border-radius: 50%;
            display: inline-block;
            margin-right: 6px;
            box-shadow: 0 0 8px var(--neon-red);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.4; }
            50% { opacity: 1; }
            100% { opacity: 0.4; }
        }

        .form-group {
            margin-bottom: 35px;
            position: relative;
        }

        label {
            display: block;
            font-family: var(--font-mono);
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--neon-purple);
            margin-bottom: 10px;
        }

        .select-wrapper {
            position: relative;
        }

        select {
            width: 100%;
            padding: 14px 16px;
            background-color: rgba(20, 16, 38, 0.9);
            border: 1px solid var(--neon-purple);
            border-radius: 0;
            color: var(--neon-blue);
            font-family: var(--font-mono);
            font-size: 14px;
            outline: none;
            cursor: pointer;
            box-sizing: border-box;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            -webkit-appearance: none;
            -moz-appearance: none;
            appearance: none;
        }

        select:focus {
            border-color: var(--neon-blue);
            box-shadow: 0 0 12px rgba(0, 240, 255, 0.3);
        }

        .select-wrapper::after {
            content: '▼';
            font-size: 10px;
            color: var(--neon-blue);
            position: absolute;
            right: 16px;
            top: 18px;
            pointer-events: none;
        }

        /* Кастомизация веб-компонента ESP Web Tools под киберпанк */
        esp-web-install-button {
            display: block;
            width: 100%;
            font-family: var(--font-mono) !important;
            --ewt-button-bg-color: transparent;
            --ewt-button-hover-bg-color: transparent;
            --ewt-button-text-color: #ffffff;
        }

        /* Кастомный хак для стилизации внутренней кнопки тега через CSS-переменные и фильтры */
        #flash-container {
            border: 1px solid var(--neon-red);
            padding: 2px;
            background: linear-gradient(135deg, var(--neon-red) 0%, #9d4edd 100%);
            transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(255, 0, 85, 0.2);
        }

        #flash-container:hover {
            box-shadow: 0 0 25px rgba(255, 0, 85, 0.5);
            transform: scale(1.01);
        }

        #flash-container esp-web-install-button::part(button) {
            background-color: #0d0b1a !important;
            border-radius: 0px !important;
            padding: 16px !important;
            text-transform: uppercase !important;
            letter-spacing: 2px !important;
            font-weight: 900 !important;
            transition: all 0.2s ease !important;
            border: none !important;
            width: 100%;
        }

        #flash-container esp-web-install-button::part(button):hover {
            color: var(--neon-blue) !important;
            background-color: rgba(20, 16, 38, 0.5) !important;
        }
    </style>
</head>
<body>

<div class="cyber-panel">
    <h1>Flasher // OS</h1>
    <div class="status-grid">
        <div><span class="status-dot"></span>CORE_STATUS: ONLINE</div>
        <div>NET_SPEED: MAXIMUM</div>
    </div>

    <div class="form-group">
        <label for="board-select">Select Target Hardware</label>
        <div class="select-wrapper">
            <select id="board-select">
                <option value="esp32s3">ESP32-S3 CORE (1 BIN)</option>
                <option value="esp8266">ESP8266 CORE (1 BIN)</option>
            </select>
        </div>
    </div>

    <!-- Контейнер-рамка для кастомизации кнопки -->
    <div id="flash-container">
        <esp-web-install-button id="install-btn"></esp-web-install-button>
    </div>
</div>

<script>
    // =========================================================================
    // ССЫЛКИ НА .BIN ФАЙЛЫ (Вставь сюда прямые адреса своих прошивок)
    // =========================================================================
    const FIRMWARE_LINKS = {
        esp32s3: "https://yourdomain.com", 
        esp8266: "https://yourdomain.com"  
    };
    // =========================================================================

    const boardSelect = document.getElementById('board-select');
    const installBtn = document.getElementById('install-btn');

    function updateManifest() {
        const selectedBoard = boardSelect.value;
        const binUrl = FIRMWARE_LINKS[selectedBoard];

        // Структура манифеста для ESP Web Tools
        const manifest = {
            name: "CYBER_" + selectedBoard.toUpperCase(),
            version: "X-2026",
            builds: [
                {
                    chipFamily: selectedBoard === "esp8266" ? "ESP8266" : "ESP32-S3",
                    parts: [
                        { path: binUrl, offset: 0 } // Прямая запись single-bin
                    ]
                }
            ]
        };

        // Генерация виртуального Blob-файла манифеста во избежание CORS ошибок fetch
        const manifestBlob = new Blob([JSON.stringify(manifest)], { type: 'application/json' });
        installBtn.manifest = URL.createObjectURL(manifestBlob);
    }

    boardSelect.addEventListener('change', updateManifest);
    
    // Первичная инициализация при загрузке страницы
    updateManifest();
</script>

</body>
</html>
