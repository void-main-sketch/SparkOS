<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESP Installer Pro</title>
    <!-- Подключение официального скрипта ESP Web Tools -->
    <script type="module" src="https://unpkg.com"></script>
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: #151d30;
            --border-color: #263554;
            --text-main: #f8fafc;
            --text-muted: #64748b;
            --accent: #2563eb;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        h1 {
            font-size: 24px;
            font-weight: 800;
            margin: 0 0 8px 0;
            background: linear-gradient(to right, #3b82f6, #10b981);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 32px;
        }

        .form-group {
            margin-bottom: 32px;
            text-align: left;
        }

        label {
            display: block;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        select {
            width: 100%;
            padding: 14px 16px;
            background-color: #1e293b;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-main);
            font-size: 15px;
            outline: none;
            cursor: pointer;
            box-sizing: border-box;
        }

        /* Кастомизация встроенной кнопки ESP Web Tools под общий дизайн */
        esp-web-install-button {
            display: block;
            width: 100%;
            --ewt-button-bg-color: #2563eb;
            --ewt-button-hover-bg-color: #1d4ed8;
            --ewt-button-text-color: #ffffff;
            --ewt-button-border-radius: 10px;
            font-family: inherit;
        }
    </style>
</head>
<body>

<div class="card">
    <h1>ESP Web Flasher</h1>
    <div class="subtitle">Установка прошивки в один клик прямо из браузера</div>

    <div class="form-group">
        <label for="board-select">Выберите вашу плату</label>
        <select id="board-select">
            <option value="esp32s3">ESP32-S3 (1 BIN)</option>
            <option value="esp8266">ESP8266 (1 BIN)</option>
        </select>
    </div>

    <!-- Компонент официальной кнопки ESP Web Tools -->
    <esp-web-install-button id="install-btn"></esp-web-install-button>
</div>

<script>
    // ==========================================
    // МЕСТО ДЛЯ ТВОИХ ССЫЛОК НА .BIN ФАЙЛЫ
    // ==========================================
    const FIRMWARE_LINKS = {
        esp32s3: "https://yourdomain.com", // Прямая ссылка на бинарник ESP32-S3
        esp8266: "https://yourdomain.com"  // Прямая ссылка на бинарник ESP8266
    };
    // ==========================================

    const boardSelect = document.getElementById('board-select');
    const installBtn = document.getElementById('install-btn');

    // Функция генерации и обновления манифеста "на лету" без физического JSON файла
    function updateManifest() {
        const selectedBoard = boardSelect.value;
        const binUrl = FIRMWARE_LINKS[selectedBoard];

        // Генерируем конфигурацию манифеста, которую требует ESP Web Tools
        const manifest = {
            name: selectedBoard.toUpperCase() + " Firmware",
            version: "1.0.0",
            builds: [
                {
                    chipFamily: selectedBoard === "esp8266" ? "ESP8266" : "ESP32-S3",
                    parts: [
                        { path: binUrl, offset: 0 } // Запись single-bin прошивки
                    ]
                }
            ]
        };

        // Превращаем объект в безопасную Data URL ссылку, чтобы избежать ошибок fetch/CORS
        const manifestBlob = new Blob([JSON.stringify(manifest)], { type: 'application/json' });
        installBtn.manifest = URL.createObjectURL(manifestBlob);
    }

    // Слушаем выбор пользователя в выпадающем списке
    boardSelect.addEventListener('change', updateManifest);

    // Инициализация при первой загрузке страницы
    updateManifest();
</script>

</body>
</html>
