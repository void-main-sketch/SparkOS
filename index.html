<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESP Flasher Web Tools</title>
    <!-- Подключение библиотеки Espruino для работы с прошивками через Web Serial -->
    <script src="https://unpkg.com"></script>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --success: #10b981;
            --border: #334155;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .container {
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 32px;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3), 0 8px 10px -6px rgba(0, 0, 0, 0.3);
        }

        h1 {
            font-size: 24px;
            font-weight: 700;
            margin-top: 0;
            margin-bottom: 8px;
            text-align: center;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 14px;
            text-align: center;
            margin-bottom: 32px;
        }

        .form-group {
            margin-bottom: 24px;
        }

        label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-muted);
        }

        select {
            width: 100%;
            padding: 12px 16px;
            background-color: var(--bg-color);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-main);
            font-size: 16px;
            outline: none;
            transition: border-color 0.2s;
            cursor: pointer;
            box-sizing: border-box;
        }

        select:focus {
            border-color: var(--primary);
        }

        .btn {
            width: 100%;
            padding: 14px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
        }

        .btn:hover {
            background-color: var(--primary-hover);
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn:disabled {
            background-color: var(--border);
            color: var(--text-muted);
            cursor: not-allowed;
            transform: none;
        }

        .status-container {
            margin-top: 24px;
            border-top: 1px solid var(--border);
            padding-top: 24px;
        }

        .status-header {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            margin-bottom: 8px;
        }

        .status-text {
            font-weight: 600;
            color: var(--text-muted);
        }

        .status-text.active {
            color: var(--primary);
        }

        .status-text.success {
            color: var(--success);
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background-color: var(--bg-color);
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 12px;
        }

        .progress-fill {
            width: 0%;
            height: 100%;
            background-color: var(--primary);
            transition: width 0.3s ease;
        }

        #log {
            width: 100%;
            height: 120px;
            background-color: var(--bg-color);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px;
            font-family: monospace;
            font-size: 12px;
            color: #a7f3d0;
            overflow-y: auto;
            white-space: pre-wrap;
            box-sizing: border-box;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>ESP Web Flasher</h1>
    <div class="subtitle">Прошивка плат через COM-порт браузера</div>

    <div class="form-group">
        <label for="firmware-select">Выберите тип платы и прошивку</label>
        <select id="firmware-select">
            <option value="esp32s3">ESP32-S3 (1 BIN)</option>
            <option value="esp8266">ESP8266 (1 BIN)</option>
        </select>
    </div>

    <button id="flash-btn" class="btn">Подключиться и прошить</button>

    <div class="status-container">
        <div class="status-header">
            <span>Статус: <span id="status-label" class="status-text">Ожидание</span></span>
            <span id="progress-percent">0%</span>
        </div>
        <div class="progress-bar">
            <div id="progress-fill" class="progress-fill"></div>
        </div>
        <label>Лог процесса</label>
        <div id="log">Нажмите кнопку выше для начала работы...</div>
    </div>
</div>

<script>
    // ==========================================
    // МЕСТО ДЛЯ ВСТАВКИ ССЫЛОК НА ТВОИ .BIN ФАЙЛЫ
    // ==========================================
    const FIRMWARE_URLS = {
        esp32s3: "https://github.com/void-main-sketch/SparkOS/raw/refs/heads/main/firmware/esp32-S3-SparkOS/build/esp32-S3-SparkOS.bin", // Ссылка на бинарник для ESP32-S3
        esp8266: "https://yourdomain.com"  // Ссылка на бинарник для ESP8266
    };
    // ==========================================

    const flashBtn = document.getElementById('flash-btn');
    const firmwareSelect = document.getElementById('firmware-select');
    const statusLabel = document.getElementById('status-label');
    const progressPercent = document.getElementById('progress-percent');
    const progressFill = document.getElementById('progress-fill');
    const logTextarea = document.getElementById('log');

    function log(message) {
        logTextarea.innerText += message + "\n";
        logTextarea.scrollTop = logTextarea.scrollHeight;
    }

    function setStatus(text, type = 'active') {
        statusLabel.innerText = text;
        statusLabel.className = 'status-text ' + type;
    }

    function updateProgress(percentage) {
        progressPercent.innerText = percentage + "%";
        progressFill.style.width = percentage + "%";
    }

    flashBtn.addEventListener('click', async () => {
        // Проверка поддержки Web Serial API браузером
        if (!('serial' in navigator)) {
            alert('Ваш браузер не поддерживает Web Serial API. Используйте Google Chrome или Microsoft Edge.');
            return;
        }

        const selectedBoard = firmwareSelect.value;
        const binUrl = FIRMWARE_URLS[selectedBoard];

        if (!binUrl || binUrl.includes("yourdomain.com")) {
            alert('Пожалуйста, укажите корректные ссылки на .bin файлы в коде скрипта!');
            return;
        }

        logTextarea.innerText = ""; // Очистка лога
        flashBtn.disabled = true;
        updateProgress(0);

        try {
            log("Загрузка файла прошивки в память браузера...");
            setStatus("Скачивание прошивки...");
            
            const response = await fetch(binUrl);
            if (!response.ok) throw new Error(`Не удалось скачать файл по ссылке: ${binUrl}`);
            const arrayBuffer = await response.arrayBuffer();
            const firmwareBinary = new Uint8Array(arrayBuffer);
            
            log(`Файл успешно загружен. Размер: ${firmwareBinary.length} байт.`);
            setStatus("Выбор COM-порта...");

            // Инициализация утилиты прошивки Espruino
            // Библиотека автоматически запрашивает доступ к COM-порту через браузер
            Espruino.Core.Serial.open(async (connectionInfo) => {
                if (!connectionInfo) {
                    log("Ошибка: Порт не выбран или занят.");
                    setStatus("Ошибка порта", "error");
                    flashBtn.disabled = false;
                    return;
                }

                log("Порт успешно открыт. Определение чипа и подготовка к прошивке...");
                setStatus("Прошивка устройства...");

                // Настройки адресации: для полноценных single-bin файлов обычно используется адрес 0x0
                const flashAddress = 0x0000;

                // Запуск процесса прошивки через встроенные методы библиотеки (эмуляция esptool)
                Espruino.Core.Flasher.flash(firmwareBinary, flashAddress, (progress, total) => {
                    const pct = Math.round((progress / total) * 100);
                    updateProgress(pct);
                    log(`Запись: ${progress}/${total} байт (${pct}%)`);
                }, (err) => {
                    if (err) {
                        log(`Ошибка прошивки: ${err}`);
                        setStatus("Сбой прошивки", "error");
                    } else {
                        log("Успешно! Прошивка полностью записана в микроконтроллер.");
                        setStatus("Готово!", "success");
                        updateProgress(100);
                    }
                    flashBtn.disabled = false;
                });
            });

        } catch (error) {
            log(`Критическая ошибка: ${error.message}`);
            setStatus("Ошибка", "error");
            flashBtn.disabled = false;
        }
    });
</script>

</body>
</html>
