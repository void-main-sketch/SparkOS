<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CYBERPUNK // SPARK-OS FLASHER</title>
    <!-- Официальная стабильная библиотека для прямой низкоуровневой прошивки через Web Serial -->
    <script src="https://unpkg.com/espruino@0.1.45/espruino.js"></script>
    <style>
        :root {
            --bg-cyber: #05050d;
            --neon-blue: #00f0ff;
            --neon-purple: #9d4edd;
            --neon-red: #ff0055;
            --neon-green: #39ff14;
            --panel-bg: rgba(13, 11, 26, 0.85);
            --panel-border: #241942;
            --text-cyber: #e2e8f0;
            --font-mono: 'Courier New', Courier, monospace;
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-cyber);
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(0, 240, 255, 0.07) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(255, 0, 85, 0.07) 0%, transparent 40%);
            color: var(--text-cyber);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
            overflow-x: hidden;
        }

        .cyber-panel {
            background: var(--panel-bg);
            backdrop-filter: blur(12px);
            border: 2px solid var(--panel-border);
            border-radius: 4px;
            padding: 40px;
            width: 100%;
            max-width: 460px;
            position: relative;
            box-shadow: 0 0 30px rgba(157, 78, 221, 0.15);
            clip-path: polygon(0 0, 93% 0, 100% 7%, 100% 100%, 7% 100%, 0 93%);
        }

        .cyber-panel::before {
            content: 'LOCAL_HOST // INTERNAL_NET';
            position: absolute;
            top: 8px;
            right: 40px;
            font-family: var(--font-mono);
            font-size: 9px;
            color: var(--neon-purple);
            letter-spacing: 2px;
        }

        h1 {
            font-family: var(--font-mono);
            font-size: 24px;
            font-weight: 900;
            margin: 0 0 6px 0;
            text-transform: uppercase;
            letter-spacing: 3px;
            text-shadow: 0 0 10px var(--neon-blue);
        }

        .status-grid {
            display: flex;
            justify-content: space-between;
            font-family: var(--font-mono);
            font-size: 11px;
            color: var(--neon-blue);
            margin-bottom: 30px;
            border-bottom: 1px solid var(--panel-border);
            padding-bottom: 12px;
        }

        .status-dot {
            width: 6px;
            height: 6px;
            background-color: var(--neon-purple);
            border-radius: 50%;
            display: inline-block;
            margin-right: 6px;
            box-shadow: 0 0 8px var(--neon-purple);
        }
        
        .status-dot.active {
            background-color: var(--neon-red);
            box-shadow: 0 0 8px var(--neon-red);
            animation: pulse 1s infinite;
        }

        @keyframes pulse { 0% { opacity: 0.4; } 50% { opacity: 1; } 100% { opacity: 0.4; } }

        .form-group {
            margin-bottom: 30px;
        }

        label {
            display: block;
            font-family: var(--font-mono);
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--neon-purple);
            margin-bottom: 10px;
        }

        .select-wrapper { position: relative; }

        select {
            width: 100%;
            padding: 14px 16px;
            background-color: rgba(20, 16, 38, 0.9);
            border: 1px solid var(--neon-purple);
            color: var(--neon-blue);
            font-family: var(--font-mono);
            font-size: 14px;
            outline: none;
            cursor: pointer;
            box-sizing: border-box;
            text-transform: uppercase;
            letter-spacing: 1px;
            -webkit-appearance: none;
            appearance: none;
        }

        select:focus {
            border-color: var(--neon-blue);
            box-shadow: 0 0 12px rgba(0, 240, 255, 0.3);
        }

        .select-wrapper::after {
            content: '▼';
            font-size: 10px;
            color: var(--neon-blue);
            position: absolute;
            right: 16px;
            top: 18px;
            pointer-events: none;
        }

        .cyber-btn {
            width: 100%;
            padding: 16px;
            background: transparent;
            border: 1px solid var(--neon-red);
            color: #fff;
            font-family: var(--font-mono);
            font-size: 15px;
            font-weight: 900;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            position: relative;
            box-shadow: 0 0 15px rgba(255, 0, 85, 0.2);
            transition: all 0.3s ease;
            background-image: linear-gradient(135deg, rgba(255, 0, 85, 0.1) 0%, rgba(157, 78, 221, 0.1) 100%);
        }

        .cyber-btn:hover:not(:disabled) {
            box-shadow: 0 0 25px rgba(255, 0, 85, 0.6);
            background-image: linear-gradient(135deg, rgba(255, 0, 85, 0.3) 0%, rgba(157, 78, 221, 0.3) 100%);
            color: var(--neon-blue);
        }

        .cyber-btn:disabled {
            border-color: var(--panel-border);
            color: #4a4a5a;
            box-shadow: none;
            background: rgba(10, 10, 20, 0.5);
            cursor: not-allowed;
        }

        .progress-section {
            margin-top: 35px;
            display: none;
        }

        .progress-info {
            display: flex;
            justify-content: space-between;
            font-family: var(--font-mono);
            font-size: 12px;
            margin-bottom: 8px;
            color: var(--neon-blue);
        }

        .cyber-progress-bar {
            width: 100%;
            height: 10px;
            background-color: rgba(20, 16, 38, 0.9);
            border: 1px solid var(--panel-border);
            position: relative;
            overflow: hidden;
            margin-bottom: 20px;
        }

        .cyber-progress-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, var(--neon-purple), var(--neon-blue));
            box-shadow: 0 0 10px var(--neon-blue);
            transition: width 0.2s ease;
        }

        #terminal-log {
            width: 100%;
            height: 110px;
            background-color: #030307;
            border: 1px solid var(--panel-border);
            padding: 12px;
            font-family: var(--font-mono);
            font-size: 11px;
            color: var(--neon-green);
            overflow-y: auto;
            white-space: pre-wrap;
            box-sizing: border-box;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.8);
        }
    </style>
</head>
<body>

<div class="cyber-panel">
    <h1>SPARK-OS // FLASHER</h1>
    <div class="status-grid">
        <div><span id="dot-indicator" class="status-dot"></span>SYS_STATUS: <span id="panel-status-text">READY</span></div>
        <div>LINK: INTERNAL_FETCH</div>
    </div>

    <div class="form-group">
        <label for="board-select">Select Hardware Core</label>
        <div class="select-wrapper">
            <select id="board-select">
                <option value="esp32s3">ESP32-S3 CORE (0x0000)</option>
                <option value="esp8266">ESP8266 CORE (0x0000)</option>
            </select>
        </div>
    </div>

    <button id="flash-btn" class="cyber-btn">Initialize Flash</button>

    <!-- Выезжающий неоновый прогресс-бар -->
    <div id="progress-area" class="progress-section">
        <div class="progress-info">
            <span id="task-status">DOWNLOADING...</span>
            <span id="percent-counter">0%</span>
        </div>
        <div class="cyber-progress-bar">
            <div id="progress-fill" class="cyber-progress-fill"></div>
        </div>
        <div id="terminal-log">System initialized. Awaiting firmware cache...</div>
    </div>
</div>

<script>
    // =========================================================================
    // ИСПРАВЛЕННЫЕ ОТНОСИТЕЛЬНЫЕ ССЫЛКИ ДЛЯ GITHUB PAGES (БЕЗ CORS ОШИБОК)
    // Убедитесь, что папки в вашем репозитории SparkOS называются именно так
    // =========================================================================
    const FIRMWARE_LINKS = {
        esp32s3: "./firmware/esp32-S3-SparkOS/build/esp32-S3-SparkOS.bin", 
        esp8266: "./firmware/esp8266-SparkOS/build/esp8266-SparkOS.bin"  
    };
    // =========================================================================

    const flashBtn = document.getElementById('flash-btn');
    const boardSelect = document.getElementById('board-select');
    const progressArea = document.getElementById('progress-area');
    const progressFill = document.getElementById('progress-fill');
    const percentCounter = document.getElementById('percent-counter');
    const taskStatus = document.getElementById('task-status');
    const terminalLog = document.getElementById('terminal-log');
    const dotIndicator = document.getElementById('dot-indicator');
    const panelStatusText = document.getElementById('panel-status-text');

    function printTerminal(msg) {
        terminalLog.innerText += `\n> ${msg}`;
        terminalLog.scrollTop = terminalLog.scrollHeight;
    }

    flashBtn.addEventListener('click', async () => {
        if (!('serial' in navigator)) {
            alert('Критическая ошибка: Ваш браузер не поддерживает Web Serial API. Используйте последние версии Google Chrome или Microsoft Edge.');
            return;
        }

        const selectedBoard = boardSelect.value;
        const internalUrl = FIRMWARE_LINKS[selectedBoard];

        // Блокируем элементы управления, открываем блок прогресса
        flashBtn.disabled = true;
        boardSelect.disabled = true;
        progressArea.style.display = 'block';
        dotIndicator.classList.add('active');
        panelStatusText.innerText = "BUSY";
        terminalLog.innerText = "[SYS] Запуск внутреннего HTTP-протокола...";

        try {
            printTerminal(`Запрос к внутреннему хранилищу: ${internalUrl}`);
            taskStatus.innerText = "DOWNLOADING...";
            
            // Скачиваем файл из того же репозитория (внутренний запрос без CORS)
            const response = await fetch(internalUrl);
            if (!response.ok) throw new Error(`Файл не найден. Код ошибки: ${response.status}. Проверьте пути к .bin файлам.`);
            
            const arrayBuffer = await response.arrayBuffer();
            const binaryData = new Uint8Array(arrayBuffer);
            
            printTerminal(`Успешно кэшировано: ${(binaryData.length / 1024).toFixed(1)} КБ.`);
            printTerminal("Инициализация Web Serial. Выберите COM-порт в окне браузера...");
            taskStatus.innerText = "SELECT PORT...";

            // Инициализация COM-порта
            Espruino.Core.Serial.open(async (connectionInfo) => {
                if (!connectionInfo) {
                    printTerminal("ОТМЕНА: Доступ к COM-порту отклонен.");
                    resetSystem("PORT ERROR");
                    return;
                }

                printTerminal("Линия связи установлена. Запуск циклической перезаписи...");
                taskStatus.innerText = "FLASHING...";

                // Базовое смещение для single-bin образов
                const writeOffsetAddress = 0x0000;

                // Запуск прошивки платы с обновлением прогресс-бара на странице
                Espruino.Core.Flasher.flash(binaryData, writeOffsetAddress, (bytesSent, bytesTotal) => {
                    const currentPercent = Math.round((bytesSent / bytesTotal) * 100);
                    
                    // Обновление неонового бара и текстового процента в реальном времени
                    progressFill.style.width = `${currentPercent}%`;
                    percentCounter.innerText = `${currentPercent}%`;
                    printTerminal(`Запись секторов: ${bytesSent}/${bytesTotal} байт`);
                }, (err) => {
                    if (err) {
                        printTerminal(`КРИТИЧЕСКИЙ СБОЙ ЗАПИСИ: ${err}`);
                        resetSystem("FAIL");
                    } else {
                        progressFill.style.width = '100%';
                        percentCounter.innerText = '100%';
                        printTerminal("🎉 СИНХРОНИЗАЦИЯ ЗАВЕРШЕНА! Прошивка успешно установлена. Перезапуск ядра...");
                        taskStatus.innerText = "SUCCESS // DONE";
                        panelStatusText.innerText = "SUCCESS";
                        dotIndicator.classList.remove('active');
                    }
                });
            });

        } catch (error) {
            printTerminal(`ОШИБКА МАРШРУТИЗАЦИИ: ${error.message}`);
            resetSystem("IO ERROR");
        }
    });

    function resetSystem(statusLabel) {
        flashBtn.disabled = false;
        boardSelect.disabled = false;
        dotIndicator.classList.remove('active');
        panelStatusText.innerText = statusLabel;
        taskStatus.innerText = "TERMINATED";
    }
</script>

</body>
</html>
